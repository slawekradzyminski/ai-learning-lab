name: Publish container image

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Immutable image tag, for example 0.1.0-rc.1
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: publish-ai-learning-lab-${{ github.ref }}
  cancel-in-progress: false

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: docker.io/slawekradzyminski/ai-learning-lab

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Validate release source and version
        id: release
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          git fetch --no-tags origin "$DEFAULT_BRANCH"
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/$DEFAULT_BRANCH"; then
            echo "The release commit must belong to $DEFAULT_BRANCH." >&2
            exit 1
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$MANUAL_VERSION"
          else
            VERSION="${REF_NAME#v}"
          fi
          if ! printf '%s' "$VERSION" | grep --extended-regexp --quiet '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$'; then
            echo "Version must look like 0.1.0 or 0.1.0-rc.1." >&2
            exit 1
          fi

          PACKAGE_VERSION=$(node --print "require('./package.json').version")
          case "$VERSION" in
            "$PACKAGE_VERSION"|"$PACKAGE_VERSION"-*) ;;
            *)
              echo "Release $VERSION does not match package version $PACKAGE_VERSION." >&2
              exit 1
              ;;
          esac
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  verify:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm run audit:extraction
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:course

      - name: Build and smoke-test the runtime image
        run: |
          docker build --tag ai-learning-lab:release-candidate .
          docker run --detach --name ai-learning-lab-release-candidate --publish 127.0.0.1:8083:80 ai-learning-lab:release-candidate
          trap 'docker rm --force ai-learning-lab-release-candidate' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8083/healthz >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              docker logs ai-learning-lab-release-candidate
              exit 1
            fi
            sleep 1
          done
          test "$(curl --fail --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:8083/learn/)" = "200"
          test "$(curl --fail --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:8083/learn/how-ai-agent-works/course/agent-loop)" = "200"

  publish:
    needs: [validate, verify]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Validate Docker Hub credentials
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repository secrets are required to publish." >&2
            exit 1
          fi

      - uses: docker/setup-qemu-action@v4.2.0
      - uses: docker/setup-buildx-action@v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.4.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6.2.0
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=${{ needs.validate.outputs.version }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.validate.outputs.version }}

      - name: Build and publish multi-platform image
        id: build
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Record published digest
        run: echo "Published digest \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
