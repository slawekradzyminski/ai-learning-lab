name: Publish container image

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Immutable image tag, for example 0.1.0-rc.1
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: publish-ai-learning-lab-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Validate release version
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$MANUAL_VERSION"
          else
            VERSION="${REF_NAME#v}"
          fi
          if ! printf '%s' "$VERSION" | grep --extended-regexp --quiet '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "Version must look like 0.1.0 or 0.1.0-rc.1" >&2
            exit 1
          fi
          PACKAGE_VERSION=$(node --print "require('./package.json').version")
          case "$VERSION" in
            "$PACKAGE_VERSION"|"$PACKAGE_VERSION"-*) ;;
            *) echo "Release $VERSION does not match package version $PACKAGE_VERSION" >&2; exit 1 ;;
          esac
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm run audit:extraction
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:course
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
