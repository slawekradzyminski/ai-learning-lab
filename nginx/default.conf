server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location = /learn {
        return 302 /learn/;
    }

    location ^~ /learn/ {
        rewrite ^/learn/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|wasm|json|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
